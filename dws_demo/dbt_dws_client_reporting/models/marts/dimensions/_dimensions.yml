version: 2

models:
  # ═══════════════════════════════════════════════════════════════════════════════
  # DIMENSION LAYER
  # ═══════════════════════════════════════════════════════════════════════════════

  - name: dim_client
    description: |
      **Client Dimension (SCD-2 with Soft Delete)**
      
      **Data Load Pattern:** SCD-2 based on dbt snapshot
      
      Tracks all historical changes to client data. Soft-deletes records
      removed from source (is_deleted=TRUE).
      
      **Query Patterns:**
      ```sql
      -- Current active clients
      SELECT * FROM dim_client WHERE is_current AND is_active;
      -- Point-in-time
      SELECT * FROM dim_client
      WHERE '2024-01-15' BETWEEN dbt_valid_from AND COALESCE(dbt_valid_to, '9999-12-31');
      ```
    access: public
    config:
      tags: ['dimension', 'scd2', 'critical']
    columns:
      - name: client_key
        description: "Surrogate key (client_id|valid_from) - unique per version"
        tests: [unique, not_null]
      - name: client_business_key
        description: "Business key - use with is_current=TRUE for joins"
        tests: [not_null]
      - name: client_id
        tests: [not_null]
      - name: client_name
        description: "Client legal name"
      - name: client_type
        description: "INSTITUTIONAL, RETAIL, PRIVATE_BANK"
      - name: client_segment
        description: "SOVEREIGN, PENSION, INSURANCE, HNWI, RETAIL"
      - name: is_current
        tests: [not_null]
      - name: is_active
        tests: [not_null]
      - name: is_deleted
        tests: [not_null]
      - name: record_status
        tests:
          - not_null
          - accepted_values:
              values: ['ACTIVE', 'INACTIVE', 'DELETED', 'HISTORICAL']
      - name: dbt_row_hash
        tests: [not_null]
      - name: dbt_run_id
        tests: [not_null]

  - name: dim_fund
    description: |
      **Fund/Product Dimension**
      
      **Data Load Pattern:** FULL REFRESH (materialized='table')
      
      Fund master data with benchmark enrichment.
    access: public
    config:
      tags: ['dimension', 'full_refresh']
      contract:
        enforced: true
    columns:
      - name: fund_id
        data_type: varchar
        tests: [not_null]
      - name: isin
        data_type: varchar
      - name: fund_key
        data_type: varchar
        tests: [unique, not_null]
      - name: fund_name
        data_type: varchar
        tests: [not_null]
      - name: fund_type
        data_type: varchar
      - name: asset_class
        data_type: varchar
      - name: fund_currency
        data_type: varchar
      - name: domicile
        data_type: varchar
      - name: inception_date
        data_type: date
      - name: ter_bps
        data_type: number
      - name: ter_pct
        data_type: number
      - name: benchmark_id
        data_type: varchar
      - name: benchmark_name
        data_type: varchar
      - name: benchmark_ticker
        data_type: varchar
      - name: benchmark_provider
        data_type: varchar
      - name: is_active
        data_type: boolean
      - name: fund_age_years
        data_type: number
      - name: dbt_row_hash
        data_type: varchar
        tests: [not_null]
      - name: dbt_run_id
        data_type: varchar
        tests: [not_null]
      - name: dbt_batch_id
        data_type: varchar
        tests: [not_null]
      - name: dbt_loaded_at
        data_type: timestamp_ntz
        tests: [not_null]
      - name: dbt_created_at
        data_type: timestamp_ntz
        tests: [not_null]
      - name: dbt_updated_at
        data_type: timestamp_ntz
        tests: [not_null]
      - name: dbt_source_model
        data_type: varchar
        tests: [not_null]
      - name: dbt_environment
        data_type: varchar
        tests: [not_null]

  - name: dim_account
    description: |
      **Account/Mandate Dimension**
      
      **Data Load Pattern:** FULL REFRESH (materialized='table')
      
      Account master data with client and benchmark enrichment.
    access: public
    config:
      tags: ['dimension', 'full_refresh']
      contract:
        enforced: true
    columns:
      - name: account_id
        data_type: varchar
        tests: [not_null]
      - name: client_id
        data_type: varchar
        tests:
          - not_null
          - relationships:
              to: source('dws_master', 'DIM_CLIENT')
              field: client_id
      - name: account_key
        data_type: varchar
        tests: [unique, not_null]
      - name: account_name
        data_type: varchar
      - name: account_type
        data_type: varchar
      - name: mandate_type
        data_type: varchar
      - name: base_currency
        data_type: varchar
      - name: inception_date
        data_type: date
      - name: management_fee_bps
        data_type: number
      - name: management_fee_pct
        data_type: number
      - name: benchmark_id
        data_type: varchar
      - name: benchmark_name
        data_type: varchar
      - name: client_name
        data_type: varchar
      - name: client_type
        data_type: varchar
      - name: client_segment
        data_type: varchar
      - name: domicile_country
        data_type: varchar
      - name: is_active
        data_type: boolean
      - name: account_age_years
        data_type: number
      - name: dbt_row_hash
        data_type: varchar
        tests: [not_null]
      - name: dbt_run_id
        data_type: varchar
        tests: [not_null]
      - name: dbt_batch_id
        data_type: varchar
        tests: [not_null]
      - name: dbt_loaded_at
        data_type: timestamp_ntz
        tests: [not_null]
      - name: dbt_created_at
        data_type: timestamp_ntz
        tests: [not_null]
      - name: dbt_updated_at
        data_type: timestamp_ntz
        tests: [not_null]
      - name: dbt_source_model
        data_type: varchar
        tests: [not_null]
      - name: dbt_environment
        data_type: varchar
        tests: [not_null]
